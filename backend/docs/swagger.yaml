basePath: /api/v1
definitions:
  auth.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: в секундах
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - student
        - teacher
        - holder
        - candidate
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - username
    type: object
  auth.RegisterResponse:
    properties:
      token:
        allOf:
        - $ref: '#/definitions/auth.AuthResponse'
        description: Изменено с *TokenPair на *AuthResponse
      user:
        $ref: '#/definitions/user.UserResponse'
    type: object
  calendar.CreateEventRequest:
    properties:
      all_day:
        type: boolean
      course_id:
        description: Для кого событие (можно указать одно из)
        type: string
      description:
        type: string
      end_time:
        type: string
      group_id:
        description: для группы
        type: string
      location:
        type: string
      online_link:
        type: string
      start_time:
        type: string
      title:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/calendar.EventType'
        enum:
        - class
        - meeting
        - deadline
        - activity
        - exam
        - holiday
      user_id:
        description: для конкретного студента
        type: string
    required:
    - end_time
    - start_time
    - title
    - type
    type: object
  calendar.EventResponse:
    properties:
      all_day:
        type: boolean
      course_name:
        type: string
      created_by:
        description: имя создателя
        type: string
      created_by_role:
        type: string
      description:
        type: string
      end_time:
        type: string
      group_name:
        type: string
      id:
        type: string
      location:
        type: string
      online_link:
        type: string
      start_time:
        type: string
      title:
        type: string
      type:
        $ref: '#/definitions/calendar.EventType'
    type: object
  calendar.EventType:
    enum:
    - class
    - meeting
    - deadline
    - activity
    - exam
    - holiday
    type: string
    x-enum-comments:
      EventTypeActivity: мероприятие
      EventTypeClass: занятие
      EventTypeDeadline: дедлайн
      EventTypeExam: экзамен
      EventTypeHoliday: выходной/праздник
      EventTypeMeeting: встреча
    x-enum-descriptions:
    - занятие
    - встреча
    - дедлайн
    - мероприятие
    - экзамен
    - выходной/праздник
    x-enum-varnames:
    - EventTypeClass
    - EventTypeMeeting
    - EventTypeDeadline
    - EventTypeActivity
    - EventTypeExam
    - EventTypeHoliday
  calendar.UpdateEventRequest:
    properties:
      all_day:
        type: boolean
      course_id:
        type: string
      description:
        type: string
      end_time:
        type: string
      group_id:
        type: string
      location:
        type: string
      online_link:
        type: string
      start_time:
        type: string
      title:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/calendar.EventType'
        enum:
        - class
        - meeting
        - deadline
        - activity
        - exam
        - holiday
      user_id:
        type: string
    type: object
  challenge.ArtifactResponse:
    properties:
      id:
        type: string
      name:
        type: string
      type:
        type: string
      url:
        type: string
    type: object
  challenge.AssessmentResponse:
    properties:
      comment:
        type: string
      id:
        type: string
      rating:
        type: integer
    type: object
  challenge.ChallengeResponse:
    properties:
      artifacts:
        items:
          $ref: '#/definitions/challenge.ArtifactResponse'
        type: array
      checkpoints:
        items:
          $ref: '#/definitions/challenge.CheckpointResponse'
        type: array
      created_at:
        type: string
      description:
        type: string
      end_date:
        type: string
      goal:
        type: string
      id:
        type: string
      progress:
        type: integer
      self_assessment:
        $ref: '#/definitions/challenge.AssessmentResponse'
      start_date:
        type: string
      status:
        $ref: '#/definitions/challenge.Status'
      title:
        type: string
      updated_at:
        type: string
    type: object
  challenge.CheckpointResponse:
    properties:
      completed_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: string
      is_completed:
        type: boolean
      order_num:
        type: integer
      title:
        type: string
    type: object
  challenge.CreateChallengeRequest:
    properties:
      description:
        type: string
      end_date:
        type: string
      goal:
        type: string
      start_date:
        type: string
      title:
        type: string
    required:
    - end_date
    - goal
    - start_date
    - title
    type: object
  challenge.Status:
    enum:
    - active
    - completed
    - overdue
    - draft
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusCompleted
    - StatusOverdue
    - StatusDraft
  challenge.UpdateChallengeRequest:
    properties:
      description:
        type: string
      end_date:
        type: string
      goal:
        type: string
      progress:
        type: integer
      start_date:
        type: string
      status:
        $ref: '#/definitions/challenge.Status'
      title:
        type: string
    type: object
  grade.CourseSummary:
    properties:
      average:
        description: средняя оценка
        type: number
      course_id:
        type: string
      course_name:
        type: string
      grades_count:
        description: количество оценок
        type: integer
      total_credits:
        description: всего кредитов
        type: integer
    type: object
  grade.CreateGradeRequest:
    properties:
      comment:
        type: string
      course_id:
        type: string
      date:
        type: string
      max_value:
        minimum: 1
        type: number
      type:
        allOf:
        - $ref: '#/definitions/grade.GradeType'
        enum:
        - exam
        - test
        - homework
        - project
        - activity
      value:
        minimum: 0
        type: number
      weight:
        minimum: 0
        type: number
    required:
    - course_id
    - date
    - max_value
    - type
    - value
    type: object
  grade.GradeResponse:
    properties:
      comment:
        type: string
      course_id:
        type: string
      course_name:
        type: string
      created_at:
        type: string
      date:
        type: string
      id:
        type: string
      max_value:
        type: number
      type:
        $ref: '#/definitions/grade.GradeType'
      value:
        type: number
      weight:
        type: number
    type: object
  grade.GradeType:
    enum:
    - exam
    - test
    - homework
    - project
    - activity
    type: string
    x-enum-comments:
      GradeTypeActivity: активность на занятии
      GradeTypeExam: экзамен
      GradeTypeHomework: домашнее задание
      GradeTypeProject: проект
      GradeTypeTest: зачёт
    x-enum-descriptions:
    - экзамен
    - зачёт
    - домашнее задание
    - проект
    - активность на занятии
    x-enum-varnames:
    - GradeTypeExam
    - GradeTypeTest
    - GradeTypeHomework
    - GradeTypeProject
    - GradeTypeActivity
  grade.StudentSummary:
    properties:
      courses:
        items:
          $ref: '#/definitions/grade.CourseSummary'
        type: array
      last_updated:
        type: string
      overall_average:
        description: общий средний балл
        type: number
      total_credits:
        description: всего кредитов
        type: integer
    type: object
  grade.UpdateGradeRequest:
    properties:
      comment:
        type: string
      date:
        type: string
      value:
        type: number
    type: object
  questionnaire.QuestionnaireResponse:
    properties:
      answers:
        additionalProperties: true
        type: object
      comment:
        type: string
      created_at:
        type: string
      id:
        type: string
      reviewed_at:
        type: string
      reviewed_by:
        description: Поля для проверки (если есть)
        type: string
      status:
        $ref: '#/definitions/questionnaire.Status'
      submitted_at:
        type: string
      updated_at:
        type: string
    type: object
  questionnaire.ReviewRequest:
    properties:
      comment:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/questionnaire.Status'
        enum:
        - approved
        - rejected
    required:
    - status
    type: object
  questionnaire.Status:
    enum:
    - draft
    - submitted
    - approved
    - rejected
    type: string
    x-enum-comments:
      StatusApproved: одобрено
      StatusDraft: черновик
      StatusRejected: отклонено
      StatusSubmitted: отправлено
    x-enum-descriptions:
    - черновик
    - отправлено
    - одобрено
    - отклонено
    x-enum-varnames:
    - StatusDraft
    - StatusSubmitted
    - StatusApproved
    - StatusRejected
  questionnaire.SubmitRequest:
    properties:
      answers:
        additionalProperties: true
        description: меняем на map
        type: object
    required:
    - answers
    type: object
  questionnaire.SubmitResponse:
    properties:
      id:
        type: string
      status:
        $ref: '#/definitions/questionnaire.Status'
      submitted_at:
        type: string
    type: object
  questionnaire.TemplateResponse:
    properties:
      description:
        type: string
      fields:
        description: меняем на slice of maps
        items:
          additionalProperties: true
          type: object
        type: array
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    type: object
  user.Role:
    enum:
    - student
    - teacher
    - holder
    - candidate
    - admin
    type: string
    x-enum-varnames:
    - RoleStudent
    - RoleTeacher
    - RoleHolder
    - RoleCandidate
    - RoleAdmin
  user.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      group_id:
        type: string
      id:
        type: string
      last_name:
        type: string
      role:
        $ref: '#/definitions/user.Role'
      updated_at:
        type: string
      username:
        type: string
    type: object
  user.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      group_id:
        type: string
      holder_id:
        type: string
      id:
        type: string
      last_name:
        type: string
      role:
        $ref: '#/definitions/user.Role'
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@studentplatform.ru
    name: API Support
  description: API для студенческой платформы Центра поддержки и развития молодёжи
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Student Platform API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Получение JWT токенов по email и паролю
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Авторизация пользователя
      tags:
      - auth
  /auth/logout:
    post:
      description: Инвалидация refresh token (клиент должен удалить токены)
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Выход из системы
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Получение новой пары токенов по refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Обновление токенов
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя и возвращает данные профиля + токены
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Регистрация нового пользователя
      tags:
      - auth
  /calendar/events:
    post:
      consumes:
      - application/json
      description: Создаёт новое событие в календаре (для преподавателей/админов/держателей)
      parameters:
      - description: Данные события
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/calendar.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/calendar.EventResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создание нового события
      tags:
      - calendar
  /calendar/events/{id}:
    delete:
      description: Удаляет событие
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удаление события
      tags:
      - calendar
    patch:
      consumes:
      - application/json
      description: Обновляет существующее событие
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/calendar.UpdateEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/calendar.EventResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновление события
      tags:
      - calendar
  /calendar/events/my:
    get:
      consumes:
      - application/json
      description: Возвращает события текущего пользователя за указанный период
      parameters:
      - description: Начало периода (RFC3339)
        in: query
        name: from
        type: string
      - description: Конец периода (RFC3339)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/calendar.EventResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получение событий календаря
      tags:
      - calendar
  /challenges:
    post:
      consumes:
      - application/json
      description: Создает новый личный вызов для студента
      parameters:
      - description: Данные вызова
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/challenge.CreateChallengeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/challenge.ChallengeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создание нового вызова
      tags:
      - challenges
  /challenges/{id}:
    delete:
      description: Удаляет вызов (только если он в статусе draft)
      parameters:
      - description: Challenge ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удаление вызова
      tags:
      - challenges
    get:
      description: Возвращает детальную информацию о конкретном вызове
      parameters:
      - description: Challenge ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/challenge.ChallengeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получение вызова по ID
      tags:
      - challenges
    patch:
      consumes:
      - application/json
      description: Обновляет существующий вызов
      parameters:
      - description: Challenge ID
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/challenge.UpdateChallengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/challenge.ChallengeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновление вызова
      tags:
      - challenges
  /challenges/my:
    get:
      description: Возвращает все вызовы текущего пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/challenge.ChallengeResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получение списка личных вызовов
      tags:
      - challenges
  /grades/{id}:
    delete:
      description: Удаляет оценку
      parameters:
      - description: Grade ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
